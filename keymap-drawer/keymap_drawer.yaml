parse_config:
  zmk_additional_includes:
    - "boards/arm/corne_choc_pro/corne_choc_pro-layouts.dtsi"
  zmk_remove_keycode_prefix: ["DE_"]
  zmk_keycode_map:
    Q: {t: Q, h: '@'}
    A_UMLAUT: "Ä"
    O_UMLAUT: "Ö"
    U_UMLAUT: "ü"
    SHARP_S: "ß"
    ESZETT: "ß"
    EURO: "€"
    ##### ----- SYMBOL ---- #####
    #row 1
    EXCL: "!"
    DQT: '"'
    SECT: "§"
    DLLR: "$"
    PRCNT: "%"
    AMPS: "&"
    FSLH: "/"
    LPAR: "("
    RPAR: ")"
    EQUAL: "="
    # BSPC: "←"
    # BSPC: "⌫"
    BSPC: "DEL"
    # row 2
    
    SZ: "ß"
    ACUTE: "´"
    EURO: "€"
    PLUS: "+"
    HASH: "#"


    QMARK: "?"
    GRAVE: "`"
    AT: "@"
    ASTRK: "*"
    APOS: "'"

# Generate SVG (run from repo root):
# keymap -c keymap-drawer/keymap_drawer.yaml parse -z config/corne_choc_pro.keymap | sed 's/zmk_keyboard: corne_choc_pro/zmk_keyboard: corneish_zen/' | sed 's/layout_name: default_layout/layout_name: foostan_corne_6col_layout/' > keymap-drawer/keymap.yaml && keymap draw keymap-drawer/keymap.yaml > keymap-drawer/keymap.svg
